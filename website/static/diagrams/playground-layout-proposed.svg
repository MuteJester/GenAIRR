<svg xmlns='http://www.w3.org/2000/svg' width='720' height='260' viewBox='0 0 720 260'>
  <defs>
    <marker id='arrow' markerWidth='8' markerHeight='8' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L6,3 z' fill='#333'/>
    </marker>
  </defs>

  <rect x='20' y='20' width='680' height='220' rx='10' ry='10' fill='#fafafa' stroke='#d0d0d0'/>
  <text x='40' y='45' font-size='12' fill='#111'>Proposed layout</text>

  <!-- Pipeline row with integrated add -->
  <rect x='50' y='60' width='460' height='36' rx='6' ry='6' fill='#f7f7f7' stroke='#333'/>
  <text x='265' y='83' font-size='11' fill='#111' text-anchor='middle'>Pipeline chips</text>
  <rect x='520' y='60' width='60' height='36' rx='6' ry='6' fill='#ffffff' stroke='#333' stroke-dasharray='3 2'/>
  <text x='550' y='83' font-size='10' fill='#111' text-anchor='middle'>Add op</text>

  <!-- Run + code toggle grouped -->
  <rect x='50' y='110' width='280' height='36' rx='6' ry='6' fill='#f7f7f7' stroke='#333'/>
  <rect x='340' y='108' width='110' height='36' rx='6' ry='6' fill='#00b4a0' stroke='#008a7a'/>
  <text x='395' y='131' font-size='11' fill='#fff' text-anchor='middle'>Run</text>
  <rect x='455' y='108' width='100' height='36' rx='6' ry='6' fill='#ffffff' stroke='#333'/>
  <text x='505' y='131' font-size='10' fill='#111' text-anchor='middle'>Show code</text>

  <!-- Parameter editor anchored to results -->
  <rect x='50' y='160' width='300' height='60' rx='6' ry='6' fill='#f7f7f7' stroke='#333'/>
  <text x='200' y='195' font-size='11' fill='#111' text-anchor='middle'>Parameter editor</text>

  <rect x='370' y='160' width='290' height='60' rx='6' ry='6' fill='#f7f7f7' stroke='#333'/>
  <text x='515' y='195' font-size='11' fill='#111' text-anchor='middle'>Results table</text>

  <line x1='350' y1='190' x2='370' y2='190' stroke='#2e8b57' stroke-width='1.2' marker-end='url(#arrow)'/>
  <text x='360' y='210' font-size='10' fill='#2e8b57' text-anchor='middle'>Context link</text>
</svg>
