name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Python test matrix ─────────────────────────────────────────
  # Builds the Rust `genairr_engine` via maturin into the current
  # virtualenv, then installs the pure-Python `GenAIRR` package and
  # runs the pytest suite. Stable Rust + abi3-py39 means one engine
  # wheel covers every Python version we test.
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine_rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine_rs/Cargo.toml') }}

      - name: Install maturin + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pandas

      - name: Build & install genairr_engine
        run: maturin develop --release -m engine_rs/Cargo.toml

      - name: Install GenAIRR (pure-Python)
        run: pip install -e .

      - name: Run pytest
        run: pytest tests/ -x -q

  # ── Rust unit + integration tests ──────────────────────────────
  # Direct `cargo test` against the engine crate. Cheaper and more
  # focused than running the whole pytest suite to validate the
  # kernel.
  cargo_test:
    name: cargo test (engine_rs)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            engine_rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('engine_rs/Cargo.toml') }}

      - name: cargo test
        working-directory: engine_rs
        run: cargo test --all-features
