name: Deploy Documentation

# Deploys the static HTML site under `website/` to GitHub Pages.
# No build step — the site is plain HTML/CSS/JS and ships as-is.

on:
  push:
    branches:
      - master
    paths:
      - 'website/**'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Package site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
