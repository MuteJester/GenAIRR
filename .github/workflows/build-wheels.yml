# Build pre-compiled wheels for all platforms and publish to PyPI.
# Triggered on release publish or version tag push.
#
# Two packages are produced:
#   - genairr_engine  (Rust, built per-OS/arch via maturin; abi3-py39)
#   - GenAIRR         (pure Python, single universal wheel + sdist)

name: Build Wheels & Publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Gate: tests must pass before any wheel is built ────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin + test deps
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest pandas

      - name: Build genairr_engine wheel
        run: maturin build --release --out dist -m engine_rs/Cargo.toml

      - name: Install genairr_engine wheel
        shell: bash
        run: pip install dist/genairr_engine-*.whl

      - name: Install GenAIRR
        run: pip install -e .

      - name: Run pytest
        run: pytest tests/ -x -q

  # ── Build genairr_engine wheels (Rust) ─────────────────────────
  # PyO3 abi3-py39 means one wheel per (OS, arch) covers Python 3.9+.
  build_engine_wheels:
    name: genairr_engine wheels (${{ matrix.target }} on ${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64
            manylinux: manylinux_2_28
          - os: ubuntu-latest
            target: aarch64
            manylinux: manylinux_2_28
          # macOS
          - os: macos-13       # Intel runner
            target: x86_64
          - os: macos-latest   # Apple Silicon runner
            target: aarch64
          # Windows
          - os: windows-latest
            target: x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wheel via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: engine_rs
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out ../dist/engine

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/engine/*.whl

  # ── Build genairr_engine sdist ─────────────────────────────────
  build_engine_sdist:
    name: genairr_engine sdist
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist via maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: engine_rs
          command: sdist
          args: --out ../dist/engine

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-sdist
          path: dist/engine/*.tar.gz

  # ── Build GenAIRR pure-Python wheel + sdist ────────────────────
  # Single universal wheel covers every OS/arch since there's no
  # native code in the GenAIRR package itself.
  build_python_dist:
    name: GenAIRR sdist + universal wheel
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  # ── Publish to PyPI ────────────────────────────────────────────
  # Both packages get pushed in a single twine upload. Skipped on
  # manual workflow_dispatch — only release publish or tag push.
  publish:
    name: Publish to PyPI
    needs: [build_engine_wheels, build_engine_sdist, build_python_dist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
