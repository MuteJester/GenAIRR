# Build pre-compiled wheels for all platforms and publish to PyPI.
# Triggered on release publish or version tag push.
# Tests must pass before wheels are built and published.

name: Build Wheels & Publish

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  # Allow manual trigger for testing the workflow
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Gate: run tests first ──────────────────────────────────────
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (builds C backend)
        run: |
          pip install pytest pandas
          pip install -e ".[all]"

      - name: Run tests
        run: pytest tests/ -x -q

  # ── Build wheels for all platforms ─────────────────────────────
  build_wheels:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Linux aarch64 wheels need QEMU emulation
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Pre-install virtualenv to avoid cibuildwheel downloading it from
      # GitHub (which frequently hits HTTP 429 rate limits).
      - name: Pre-cache virtualenv for cibuildwheel
        run: pip install virtualenv

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          # On macOS, build universal2 for both x86_64 and arm64
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          # Use pip-installed virtualenv instead of downloading virtualenv.pyz
          CIBW_DEPENDENCY_VERSIONS: "latest"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # ── Build source distribution ──────────────────────────────────
  build_sdist:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to PyPI ────────────────────────────────────────────
  publish:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only publish on release or tag push (not manual dispatch)
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
