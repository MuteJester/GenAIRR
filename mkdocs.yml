site_name: GenAIRR Documentation
site_description: Modular Immunoglobulin Sequence Simulation Framework
site_url: https://genairr.readthedocs.io/
repo_url: https://github.com/MuteJester/GenAIRR
repo_name: MuteJester/GenAIRR

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - def_list
  - toc:
      permalink: true

plugins:
  - search
  - mkdocs-jupyter

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Quick Start: getting_started.md
    - Step-by-Step Tutorial: step_by_step_tutorial.md
  - Concepts:
    - Biological Context: biological_context.md
    - How the Pipeline Works: genairr_flow.md
    - Productive Sequences: concepts/productivity.md
    - Pipeline Operations & Step Order: concepts/pipeline_operations.md
    - Step Deep-Dives: concepts/step_deep_dives.md
    - DataConfig In Depth: concepts/dataconfig_deep_dive.md
    - Best Practices: best_practices.md
  - Tutorials:
    - Quick Start Guide: tutorials/Quick Start Guide.ipynb
    - Advanced Custom Generation: tutorials/Advanced Custom Generation.ipynb
    - Introduction to DataConfig: tutorials/Introduction to the DataConfig Object.ipynb
    - Creating Custom DataConfig: tutorials/Creating Custom DataConfig from FASTA Files.ipynb
    - Uniform Allele Distribution Dataset: tutorials/Generating_Uniform_Allele_Distribution_Dataset.ipynb
  - Reference:
    - API Reference: api_reference.md
    - Parameter Reference: parameter_reference.md
  - Advanced:
    - Custom DataConfig: custom_data_config.md
  - Support:
    - FAQ: faq.md
    - Troubleshooting: troubleshooting.md
    - Migration Guide: migration_guide.md
